name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate template schema compliance
        run: python scripts/validate_templates.py
      - name: Audit private boundary leakage
        run: python scripts/audit_private_boundary.py
      - name: Run contract/scaffold tests
        run: python -m unittest discover -s tests
